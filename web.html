// ─── MINI CHART (SVG line) ────────────────────────────────────────────────────
function MiniLineChart({ data, color = C.primaryLight, height = 60, width = "100%", label = "" }) {
  const pts = data || [40, 55, 45, 70, 60, 80, 65];
  const max = Math.max(...pts), min = Math.min(...pts);
  const W = 300, H = height;
  const points = pts.map((v, i) => {
    const x = (i / (pts.length - 1)) * W;
    const y = H - ((v - min) / (max - min || 1)) * (H - 8) - 4;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width, height }} preserveAspectRatio="none">
      <polyline points={points} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

// ─── DONUT CHART ─────────────────────────────────────────────────────────────
function DonutChart({ value = 78, size = 80, color = C.primary }) {
  const r = 30, cx = 40, cy = 40;
  const circ = 2 * Math.PI * r;
  const dash = (value / 100) * circ;
  return (
    <svg width={size} height={size} viewBox="0 0 80 80">
      {/* Sửa stroke màu tối thành xám nhạt mờ */}
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(0,0,0,0.06)" strokeWidth="8" />
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="8"
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`} />
      <text x={cx} y={cy + 5} textAnchor="middle" fill={C.text} fontSize="14" fontWeight="700">{value}%</text>
    </svg>
  );
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function ProgressBar({ value, color, height = 6 }) {
  const c = value > 70 ? C.green : value > 40 ? C.yellow : C.red;
  return (
    // Sửa background track thành xám nhạt
    <div style={{ background: "rgba(0,0,0,0.06)", borderRadius: 99, height, overflow: "hidden", flex: 1 }}>
      <div style={{ width: `${value}%`, height: "100%", background: color || c, borderRadius: 99, transition: "width .5s" }} />
    </div>
  );
}

// ─── TEACHER HOME (ĐÃ NÂNG CẤP FULL DASHBOARD DỮ LIỆU ĐỘNG) ───────────────────
function TeacherHome({ students, onViewStudent, onNavigate }) {
  // 1. TÍNH TOÁN CÁC CHỈ SỐ TỔNG QUAN TỪ DỮ LIỆU IMPORT
  const total = students.length || 1; 
  const avgMotivation = Math.round(students.reduce((acc, st) => acc + st.motivation, 0) / total) || 0;
  const avgCompletion = Math.round(students.reduce((acc, st) => acc + st.completion, 0) / total) || 0;
  
  const attentionStudents = students.filter(item => item.risk === "cao" || item.motivation < 65);
  const highRiskCount = attentionStudents.length;

  // 2. TÍNH TOÁN BIỂU ĐỒ XU HƯỚNG TỪ DATA THỰC TẾ
  const hasData = students.length > 0;
  const computedWeekData = hasData
    ? Array.from({ length: 7 }, (_, i) => {
        const daySum = students.reduce((sum, st) => sum + (st.trendData ? st.trendData[i] : st.motivation), 0);
        return Math.round(daySum / students.length);
      })
    : [65, 72, 68, 55, 45, 60, 70]; // Dữ liệu mẫu ban đầu

  const computedMonthData = hasData
    ? Array.from({ length: 30 }, (_, i) => {
        const wave = Math.sin(i * 0.5) * 5; // Tạo gợn sóng tự nhiên bám theo điểm trung bình
        const noise = (students.length * i) % 4 - 2;
        return Math.min(100, Math.max(10, Math.round(avgMotivation + wave + noise)));
      })

// ─── STUDENT DETAIL (BẢN ĐÃ FIX HOÀN TOÀN LỖI SẬP MÀN HÌNH TỐI ĐEN) ──────────
function StudentDetail({ student, onBack, onNavigate }) {
  const todayScore = student.motivation;
  let p1, p2, p3, f1, f2;

  // Thuật toán tính toán đồ thị biến thiên động theo từng học sinh
  if (student.risk === "cao" || todayScore < 50) {
    p1 = Math.min(100, todayScore + 25);
    p2 = Math.min(100, todayScore + 18);
    p3 = Math.min(100, todayScore + 10);
    f1 = Math.max(5, todayScore - 15);
    f2 = Math.max(5, todayScore - 28);
  } else if (student.risk === "ổn định" || todayScore >= 75) {
    p1 = Math.max(10, todayScore - 5);
    p2 = Math.max(10, todayScore - 3);
    p3 = Math.max(10, todayScore - 1);
    f1 = Math.min(100, todayScore + 3);
    f2 = Math.min(100, todayScore + 6);
  } else {
    p1 = Math.max(10, todayScore - 2);
    p2 = Math.max(10, todayScore + 5);
    p3 = Math.max(10, todayScore + 2);
    f1 = Math.max(5, todayScore - 4);
    f2 = Math.max(5, todayScore - 10);
  }

  const dynamicTrendData = [p1, p2, p3, todayScore, f1, f2];

  // Khai báo đầy đủ các biến tính toán chỉ số hiệu suất
  const quizAccuracy = Math.min(100, Math.max(10, todayScore - 5));
  const studyMins = Math.max(5, Math.floor(todayScore * 0.7)); // <-- ĐÃ THÊM BIẾN NÀY ĐỂ FIX LỖI CRASH
  const attendanceRate = student.risk === "ổn định" ? 98 : student.risk === "cao" ? 65 : 85;
  const assignmentRate = student.risk === "ổn định" ? 95 : student.risk === "cao" ? 40 : 75;
  const discussionRate = student.risk === "ổn định" ? 88 : student.risk === "cao" ? 15 : 50;

  const activityLogs = student.risk === "cao"
    ? [
        { time: "2 giờ trước", action: "Thoát video bài giảng giữa chừng", desc: "Bài 2: Cực trị hàm số (Xem được 4/32 phút)", status: "error" },
        { time: "1 ngày trước", action: "Bỏ lỡ hạn nộp bài tập về nhà", desc: "Bài tập trắc nghiệm tính đơn điệu hàm số", status: "warning" },
        { time: "3 ngày trước", action: "Làm Quiz số 02 đạt điểm dưới trung bình", desc: "Kết quả: 3.0/10 (Sai liên tiếp 6 câu cuối)", status: "error" }
      ]
    : [
        { time: "30 phút trước", action: "Hoàn thành video bài giảng", desc: "Bài 3: Giá trị lớn nhất & nhỏ nhất (Hoàn thành 100%)", status: "success" },

// ─── TEACHER ANALYTICS ────────────────────────────────────────────────────────
function TeacherAnalytics({ students }) {
  const weekData = [70, 65, 68, 55, 48, 60, 72];
  const total = students.length || 1; 
  const avgMotivation = Math.round(students.reduce((acc, s) => acc + s.motivation, 0) / total);
  const avgCompletion = Math.round(students.reduce((acc, s) => acc + s.completion, 0) / total);
  
  const stableCount = students.filter(s => s.risk === "ổn định").length;
  const watchCount = students.filter(s => s.risk === "trung bình").length;
  const highRiskCount = students.filter(s => s.risk === "cao").length;
  const topStudents = [...students].sort((a, b) => b.motivation - a.motivation).slice(0, 3);

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: C.text }}>Phân tích lớp học</h2>
        <div style={{ color: C.textMuted, fontSize: 14, marginTop: 6 }}>Theo dõi mức độ tham gia, động lực và hiệu quả học tập của toàn bộ lớp.</div>
      </div>

      <div style={{ display: "flex", gap: 20, marginBottom: 24 }}>
        {[
          { label: "TỔNG SỐ HỌC SINH", value: students.length, sub: "Đã import dữ liệu" },
          { label: "ĐỘNG LỰC TRUNG BÌNH", value: `${avgMotivation}%`, progress: avgMotivation },
          { label: "TỶ LỆ HOÀN THÀNH", value: `${avgCompletion}%`, progress: avgCompletion },
          { label: "CẦN HỖ TRỢ GẤP", value: highRiskCount < 10 ? `0${highRiskCount}` : highRiskCount, sub: "Nguy cơ cao", alert: true },
        ].map((m, i) => (
          <div key={i} style={{ ...s.metricCard, border: m.alert ? `1px solid ${C.red}44` : `1px solid ${C.cardBorder}` }}>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600 }}>{m.label}</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: m.alert && m.value > 0 ? C.red : C.text, marginTop: 8, marginBottom: 8 }}>{m.value}</div>
            {m.sub && <div style={{ fontSize: 12, color: C.textMuted, marginBottom: m.progress !== undefined ? 12 : 0 }}>{m.sub}</div>}
            {m.progress !== undefined && <ProgressBar value={m.progress} color={C.primary} height={6} />}
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 20, marginBottom: 24 }}>
        <div style={{ ...s.card, flex: 2 }}>
          <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 16, color: C.text }}>Xu hướng động lực học tập</div>
          <MiniLineChart data={weekData} height={120} color={C.primary} />
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
            {["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "CN"].map(d => (
              <span key={d} style={{ fontSize: 11, color: C.textMuted, fontWeight: 600 }}>{d}</span>
            ))}
          </div>
        </div>

        <div style={{ ...s.card, flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 20, color: C.text }}>Phân loại trạng thái</div>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 24 }}>
            <DonutChart value={Math.round((stableCount / total) * 100) || 0} size={120} color={C.green} />
          </div>
          {[["Ổn định", stableCount, C.green], ["Cần theo dõi", watchCount, C.yellow], ["Nguy cơ cao", highRiskCount, C.red]].map(([label, count, color], i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: color }} />

            </div>
          ))}
        </div>
      </div>

      <div style={{ display: "flex", gap: 20 }}>
        <div style={{ ...s.card, flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 20, color: C.text }}>Mức độ tương tác học tập</div>
          {[["XEM VIDEO", avgCompletion], ["HOÀN THÀNH QUIZ", avgMotivation], ["NỘP BÀI TẬP", avgCompletion - 10], ["THAM GIA THẢO LUẬN", avgMotivation - 20]].map(([label, val], i) => (
            <div key={i} style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ fontSize: 12, color: C.textMuted, fontWeight: 600 }}>{label}</span>

              <ProgressBar value={val} color={C.primary} height={6} />

          ))}
        </div>

        <div style={{ ...s.card, background: C.taskBg, flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 16, color: C.text }}>✦ Thông tin chi tiết từ AI</div>
          {[
            { icon: "▶️", text: `${highRiskCount} học sinh rủi ro cao`, sub: 'Nhóm "Khách du lịch" theo phân loại của hệ thống.' },
            { icon: "📉", text: "Động lực trung bình", sub: `Hiện tại đang ở mức ${avgMotivation}% toàn lớp.` },
          ].map((item, i) => (
            <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12, background: C.card, border: `1px solid ${C.cardBorder}`, borderRadius: 12, padding: "12px 16px" }}>
              <span style={{ fontSize: 20 }}>{item.icon}</span>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 4 }}>{item.text}</div>
                <div style={{ fontSize: 12, color: C.textMuted, lineHeight: 1.5 }}>{item.sub}</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
          <div style={{ ...s.card, flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 16, color: C.text }}>Top học sinh xuất sắc 🏆</div>
            {topStudents.length === 0 ? <div style={{fontSize: 13, color: C.textMuted}}>Chưa có dữ liệu</div> : topStudents.map((st, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: i === 2 ? "none" : `1px solid ${C.cardBorder}` }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: ["#dcfce7", "#dbeafe", "#f3e8ff"][i] || C.taskBg, color: ["#16a34a", "#2563eb", "#9333ea"][i] || C.text, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700 }}>
                   {st.name.charAt(0)}
                </div>
                <span style={{ fontSize: 14, flex: 1, color: C.text, fontWeight: 500 }}>{st.name}</span>
                <span style={{ fontSize: 14, color: C.green, fontWeight: 700 }}>{st.motivation}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── TEACHER LESSONS (ĐÃ THÊM LOGIC LƯU BÀI HỌC VÀO KHO CHUNG) ─────────────────
function TeacherLessons({ onNavigate, globalLessons, setGlobalLessons }) {
  const [viewState, setViewState] = useState("list");
  const [activeLesson, setActiveLesson] = useState(null);
  const [courseName, setCourseName] = useState("");
  const [chapterOpt, setChapterOpt] = useState("Chương 1: Khảo sát hàm số");
  const [activeChapterFilter, setActiveChapterFilter] = useState(0);

  const chapters = ["Tất cả", "Chương 1: Khảo sát hàm số", "Chương 2: Mũ & Lôgarit", "Chương 3: Nguyên hàm & Tích phân", "Chương 4: Số phức", "Chương 5: Hình học Oxyz"];
  const chaptersSelect = chapters.slice(1); 

  // Lấy dữ liệu từ kho chung thay vì fix cứng
  const filteredLessons = activeChapterFilter === 0 
    ? globalLessons 
    : globalLessons.filter(l => l.chapterId === activeChapterFilter);

  const gradients = [
    "linear-gradient(135deg, #7f1d1d, #ef4444)", "linear-gradient(135deg, #1e3a8a, #3b82f6)", 
    "linear-gradient(135deg, #064e3b, #10b981)", "linear-gradient(135deg, #78350f, #f59e0b)", 
    "linear-gradient(135deg, #4c1d95, #8b5cf6)"
  ];

  // HÀM XUẤT BẢN BÀI GIẢNG VÀO KHO CHUNG
  const handlePublish = () => {
    if (!courseName.trim()) { alert("Vui lòng nhập tên bài giảng!"); return; }
    
    // Ánh xạ tên chương thành ID chương
    const chapterIndex = chaptersSelect.indexOf(chapterOpt) + 1; 
    
    const newLesson = {
      id: Date.now(), // Tạo ID ngẫu nhiên
      chapterId: chapterIndex > 0 ? chapterIndex : 1,
      title: courseName,
      time: "45 phút", // Giả lập thời lượng
      completed: 0,
      total: 45, // Sĩ số lớp
      progress: 0 // Tiến độ của học sinh lúc mới tạo
    };

    setGlobalLessons(prev => [...prev, newLesson]); // Cập nhật kho chung
    alert(`Đã xuất bản thành công: ${courseName}`);
    setCourseName(""); // Reset form
    setViewState("list"); // Trở về danh sách
  };

  // MÀN HÌNH TẠO MỚI (CHỈ GIỮ LẠI ĐOẠN RENDER NÚT XUẤT BẢN THAY ĐỔI)

    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>

            <ArrowLeft /> Trở về kho

          <span style={{ color: C.cardBorder, fontSize: 20 }}>|</span>

              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>

              </div>
              
              <div style={{ display: "flex", gap: 16, marginBottom: 16 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, color: C.textMuted, fontWeight: 600, marginBottom: 8 }}>MÔN HỌC / KHỐI LỚP</div>
                  <div style={{ width: "100%", background: "#f8fafc", border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: "12px 16px", color: C.textMuted, fontSize: 14, fontWeight: 600 }}>Toán học - Lớp 12</div>
                </div>
                <div style={{ flex: 2 }}>
                  <div style={{ fontSize: 12, color: C.textMuted, fontWeight: 600, marginBottom: 8 }}>CHƯƠNG / CHUYÊN ĐỀ</div>
                  <select value={chapterOpt} onChange={e => setChapterOpt(e.target.value)}
                    style={{ width: "100%", background: C.taskBg, border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: "12px 16px", color: C.text, fontSize: 14, outline: "none", fontWeight: 600, cursor: "pointer" }}>
                    {chaptersSelect.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              </div>

              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, color: C.textMuted, fontWeight: 600, marginBottom: 8 }}>TÊN BÀI GIẢNG</div>
                <input value={courseName} onChange={e => setCourseName(e.target.value)}
                  placeholder="Ví dụ: Ôn tập vận dụng cao phương trình mặt cầu..."
                  style={{ width: "100%", background: C.taskBg, border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: "12px 16px", color: C.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
              </div>
            </div>

            <div style={s.card}>

                <div style={{ display: "flex", alignItems: "center", gap: 10 }}><span style={{ fontSize: 18 }}>📁</span><span style={{ fontWeight: 600, fontSize: 15, color: C.text }}>Tải lên tài liệu</span></div>

              </div>
              <div style={{ border: `2px dashed ${C.cardBorder}`, background: C.bg, borderRadius: 12, padding: 32, textAlign: "center", marginBottom: 16, cursor: "pointer" }}>

                <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 4 }}>Kéo thả tài liệu bài giảng vào đây</div>
              </div>
            </div>
          </div>

          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 20 }}>
            <div style={s.card}>
              <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 16, color: C.text }}>📋 Lộ trình chặng học</div>
              {[["⊙", "Bài giảng Video"], ["📋", "Quiz Khởi động"], ["★", "Giao BTVN"]].map(([icon, title], i) => (
                <div key={i} style={{ display: "flex", gap: 12, padding: "12px 0", borderBottom: i < 2 ? `1px solid ${C.cardBorder}` : "none" }}>

          </div>
        </div>
      </div>
    );
  }

  // MÀN HÌNH CHI TIẾT
  if (viewState === "detail" && activeLesson !== null) {
    const progressPct = Math.round((activeLesson.completed / activeLesson.total) * 100);
    return (
      <div style={{ color: C.text }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
          <button onClick={() => { setViewState("list"); setActiveLesson(null); }} style={{ ...s.btnOutline, display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", background: C.card }}>

            </div>
          </div>
        </div>
      </div>
    );

  // MÀN HÌNH DANH SÁCH (KHO BÀI GIẢNG)
  return (
    <div style={{ color: C.text }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 24 }}>

        </div>
        <button style={s.btn} onClick={() => setViewState("create")}>+ Tạo bài giảng mới</button>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
        {chapters.map((ch, i) => (
          <button key={i} onClick={() => setActiveChapterFilter(i)} style={{
            background: activeChapterFilter === i ? C.primary : C.card, color: activeChapterFilter === i ? "#fff" : C.textMuted,
            border: `1px solid ${activeChapterFilter === i ? C.primary : C.cardBorder}`, borderRadius: 24, padding: "8px 20px", fontSize: 13, cursor: "pointer", fontWeight: 700
          }}>{ch}</button>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 20 }}>
        {filteredLessons.map((lesson) => {
          const bgGrad = gradients[lesson.id % gradients.length];
          const pct = Math.round((lesson.completed / lesson.total) * 100);
          return (
            <div key={lesson.id} onClick={() => { setActiveLesson(lesson); setViewState("detail"); }} style={{ borderRadius: 16, overflow: "hidden", cursor: "pointer", border: `1px solid ${C.cardBorder}`, background: C.card }}>
              <div style={{ background: bgGrad, height: 140, display: "flex", alignItems: "flex-end", padding: 16 }}>
                 <div style={{ background: "rgba(0,0,0,0.4)", color: "#fff", padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 700 }}>Sĩ số: {lesson.total}</div>
              </div>
              <div style={{ padding: 16 }}>
                <div style={{ fontSize: 10, color: C.primary, fontWeight: 800, marginBottom: 6, textTransform: "uppercase" }}>{chapters[lesson.chapterId]}</div>
                <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 16, lineHeight: 1.4, color: C.text, height: 42 }}>{lesson.title}</div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.textMuted, marginBottom: 8, fontWeight: 700 }}>
                  <span>Hoàn thành: {lesson.completed}/{lesson.total} HS</span><span style={{ color: pct > 80 ? C.green : C.primary }}>{pct}%</span>
                </div>
                <ProgressBar value={pct} color={pct > 80 ? C.green : C.primary} height={6} />
              </div>
            </div>
          )
        })}
      </div>
    </div>
  );
}

                <div key={i} style={{ background: C.taskBg, borderRadius: 12, padding: 16, cursor: "pointer", border: "1px solid transparent", transition: "all 0.2s" }}

          {/* Ghi chú lịch sử */}

            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12, color: C.text }}>Lịch sử can thiệp</div>
            <div style={{ fontSize: 12, color: C.textMuted, fontStyle: "italic", textAlign: "center", padding: "20px 0" }}>

            </div>
          </div>

        </div>
      </div>
    </div>
  );

    { id: 8, chapterId: 3, title: "Bài 1: Khái niệm & Tính chất Nguyên hàm", time: "30 phút", completed: 5, total: 45, progress: 55 },
